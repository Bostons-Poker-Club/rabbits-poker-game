<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Full-bleed background (maskable-safe) -->
  <rect width="512" height="512" fill="#040e07"/>

  <!-- Felt-table inner circle -->
  <circle cx="256" cy="256" r="242" fill="#091c10"/>

  <!-- Gold ring -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="#c8a84b" stroke-width="5"/>

  <!-- ── Character: viewBox 400×460 scaled to fit ──
       Scale ≈ 0.97, translate so character is vertically
       centred with slight upward nudge for visual balance -->
  <g transform="translate(60, 22) scale(0.98)">

    <!-- EARS -->
    <g transform="rotate(-11, 158, 143)">
      <ellipse cx="158" cy="75" rx="27" ry="70" fill="#e8e8e6" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="158" cy="73" rx="14.5" ry="54" fill="#f5afc5"/>
    </g>
    <g transform="rotate(11, 242, 143)">
      <ellipse cx="242" cy="75" rx="27" ry="70" fill="#e8e8e6" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="242" cy="73" rx="14.5" ry="54" fill="#f5afc5"/>
    </g>

    <!-- JACKET BODY -->
    <path d="M125 286 Q200 310 275 286 L295 460 L105 460 Z" fill="#111111"/>
    <path d="M125 286 L178 308 L162 358 L105 392 L105 328 Z" fill="#1b1b1b"/>
    <path d="M125 286 L152 286 L178 308 Z" fill="#0a0a0a"/>
    <path d="M275 286 L222 308 L238 358 L295 392 L295 328 Z" fill="#1b1b1b"/>
