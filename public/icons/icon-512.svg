    <ellipse cx="172" cy="193" rx="21" ry="23" fill="white" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="172" cy="195" rx="14" ry="16" fill="#c8a84b"/>
    <ellipse cx="174" cy="195" rx="8.5" ry="9.5" fill="#0a0300"/>
    <circle  cx="180" cy="188" r="4.5" fill="white"/>

    <ellipse cx="228" cy="193" rx="21" ry="23" fill="white" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="228" cy="195" rx="14" ry="16" fill="#c8a84b"/>
    <ellipse cx="230" cy="195" rx="8.5" ry="9.5" fill="#0a0300"/>
    <circle  cx="236" cy="188" r="4.5" fill="white"/>

    <path d="M152 174 Q172 166 190 170" stroke="#888" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M210 170 Q228 163 248 170" stroke="#888" stroke-width="3" fill="none" stroke-linecap="round"/>

    <line x1="200" y1="210" x2="200" y2="222" stroke="#d8d8d4" stroke-width="1.5"/>
    <ellipse cx="200" cy="226" rx="9" ry="6" fill="#f07888"/>

    <path d="M182 237 Q198 253 222 244" stroke="#888" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <circle cx="222" cy="244" r="2.5" fill="#d0d0cc"/>
    <path d="M188 240 Q200 246 214 240" fill="#f8f8f8" stroke="#e0e0dc" stroke-width="1.2"/>

    <!-- BOW TIE -->
    <path d="M168 295 L190 285 L190 305 Z" fill="#c8a84b" stroke="#9a7830" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M232 295 L210 285 L210 305 Z" fill="#c8a84b" stroke="#9a7830" stroke-width="1.5" stroke-linejoin="round"/>
    <ellipse cx="200" cy="295" rx="12" ry="9" fill="#c8a84b" stroke="#9a7830" stroke-width="1.5"/>
    <ellipse cx="197" cy="291" rx="5" ry="3" fill="#e8c870" opacity="0.5"/>

