    <path d="M262 308 C294 322 328 348 342 384" stroke="#181818" stroke-width="38" stroke-linecap="round" fill="none"/>
    <ellipse cx="346" cy="390" rx="26" ry="12" fill="#f0f0ee" stroke="#111" stroke-width="1.5" transform="rotate(-30, 346, 390)"/>
    <ellipse cx="350" cy="398" rx="24" ry="18" fill="#e8e8e6" stroke="#111" stroke-width="2.5"/>
    <path d="M336 392 Q342 382 350 387" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M344 388 Q351 378 358 384" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- HEAD -->
    <ellipse cx="203" cy="208" rx="90" ry="82" fill="rgba(0,0,0,0.07)"/>
    <ellipse cx="200" cy="205" rx="90" ry="82" fill="#f0f0ee" stroke="#111" stroke-width="3"/>

