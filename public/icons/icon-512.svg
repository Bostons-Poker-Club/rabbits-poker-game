    <circle cx="200" cy="360" r="2.5" fill="#c8c8c4"/>

    <!-- LEFT ARM -->
    <g transform="rotate(-9, 130, 316)">
      <rect x="109" y="316" width="42" height="98" rx="21" fill="#111111"/>
      <rect x="107" y="395" width="46" height="14" rx="7" fill="#f0f0ee"/>
      <ellipse cx="130" cy="426" rx="23" ry="17" fill="#e8e8e6" stroke="#111" stroke-width="2"/>
    </g>

    <!-- CARDS -->
    <g transform="rotate(-17, 338, 382)">
      <rect x="296" y="316" width="48" height="70" rx="5" fill="#fafaf6" stroke="#222" stroke-width="2"/>
      <text x="302" y="333" font-size="13" font-weight="bold" font-family="Georgia,'Times New Roman',serif" fill="#cc1111">K</text>
      <text x="302" y="346" font-size="10" font-family="Georgia,'Times New Roman',serif" fill="#cc1111">♥</text>
      <text x="320" y="372" font-size="22" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" fill="#cc1111">♥</text>
      <text x="339" y="385" font-size="13" font-weight="bold" font-family="Georgia,'Times New Roman',serif" fill="#cc1111" transform="rotate(180 339 379)">K</text>
    </g>
    <g transform="rotate(7, 338, 382)">
      <rect x="306" y="316" width="48" height="70" rx="5" fill="white" stroke="#222" stroke-width="2"/>
      <text x="312" y="333" font-size="13" font-weight="bold" font-family="Georgia,'Times New Roman',serif" fill="#111">A</text>
      <text x="312" y="346" font-size="10" font-family="Georgia,'Times New Roman',serif" fill="#111">♠</text>
      <text x="330" y="372" font-size="22" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" fill="#111">♠</text>
      <text x="349" y="385" font-size="13" font-weight="bold" font-family="Georgia,'Times New Roman',serif" fill="#111" transform="rotate(180 349 379)">A</text>
    </g>

