<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">

  <!-- Full-bleed background -->
  <rect width="192" height="192" fill="#040e07"/>

  <!-- Felt circle -->
  <circle cx="96" cy="96" r="91" fill="#091c10"/>

  <!-- Gold ring -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="#c8a84b" stroke-width="2.5"/>

  <!-- Character scaled to 0.366 (400×460 → ~146×168), centred -->
  <!-- translate(19, 6) scale(0.366) puts 400-wide char into ~146px, centred in 192 -->
  <g transform="translate(19, 4) scale(0.366)">

    <!-- EARS -->
    <g transform="rotate(-11, 158, 143)">
      <ellipse cx="158" cy="75" rx="27" ry="70" fill="#e8e8e6" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="158" cy="73" rx="14.5" ry="54" fill="#f5afc5"/>
    </g>
    <g transform="rotate(11, 242, 143)">
      <ellipse cx="242" cy="75" rx="27" ry="70" fill="#e8e8e6" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="242" cy="73" rx="14.5" ry="54" fill="#f5afc5"/>
    </g>

    <!-- JACKET -->
    <path d="M125 286 Q200 310 275 286 L295 460 L105 460 Z" fill="#111111"/>
    <path d="M125 286 L178 308 L162 358 L105 392 L105 328 Z" fill="#1b1b1b"/>
    <path d="M275 286 L222 308 L238 358 L295 392 L295 328 Z" fill="#1b1b1b"/>
    <path d="M178 308 Q200 320 222 308 L228 378 Q200 392 172 378 Z" fill="#f0f0ee"/>

    <!-- CARDS (simplified at small scale) -->
    <g transform="rotate(-17, 338, 382)">
      <rect x="296" y="316" width="48" height="70" rx="5" fill="#fafaf6" stroke="#222" stroke-width="2.5"/>
      <text x="320" y="364" font-size="26" text-anchor="middle" font-family="Georgia,serif" fill="#cc1111">♥</text>
    </g>
    <g transform="rotate(7, 338, 382)">
      <rect x="306" y="316" width="48" height="70" rx="5" fill="white" stroke="#222" stroke-width="2.5"/>
      <text x="330" y="364" font-size="26" text-anchor="middle" font-family="Georgia,serif" fill="#111">♠</text>
    </g>

    <!-- RIGHT ARM -->
    <path d="M262 308 C294 322 328 348 342 384" stroke="#111111" stroke-width="50" stroke-linecap="round" fill="none"/>
    <ellipse cx="350" cy="398" rx="24" ry="18" fill="#e8e8e6" stroke="#111" stroke-width="2.5"/>

    <!-- HEAD -->
    <ellipse cx="200" cy="205" rx="90" ry="82" fill="#f0f0ee" stroke="#111" stroke-width="3"/>

    <!-- FACE -->
    <ellipse cx="172" cy="193" rx="21" ry="23" fill="white" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="172" cy="195" rx="14" ry="16" fill="#c8a84b"/>
    <ellipse cx="174" cy="195" rx="8.5" ry="9.5" fill="#0a0300"/>
    <circle  cx="180" cy="188" r="4.5" fill="white"/>

    <ellipse cx="228" cy="193" rx="21" ry="23" fill="white" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="228" cy="195" rx="14" ry="16" fill="#c8a84b"/>
    <ellipse cx="230" cy="195" rx="8.5" ry="9.5" fill="#0a0300"/>
    <circle  cx="236" cy="188" r="4.5" fill="white"/>

    <ellipse cx="200" cy="226" rx="9" ry="6" fill="#f07888"/>
    <path d="M182 237 Q198 253 222 244" stroke="#888" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- BOW TIE -->
    <path d="M168 295 L190 285 L190 305 Z" fill="#c8a84b"/>
    <path d="M232 295 L210 285 L210 305 Z" fill="#c8a84b"/>
    <ellipse cx="200" cy="295" rx="12" ry="9" fill="#c8a84b" stroke="#9a7830" stroke-width="1.5"/>

  </g>
</svg>
