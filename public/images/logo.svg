<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" role="img" aria-label="Boston Poker Club – RabbsRoom mascot">

  <!-- ══════════════════════════════════════════
       EARS — drawn behind head
  ══════════════════════════════════════════ -->

  <!-- Left ear -->
  <g transform="rotate(-11, 158, 143)">
    <ellipse cx="158" cy="75" rx="27" ry="70" fill="#e8e8e6" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <ellipse cx="158" cy="73" rx="14.5" ry="54" fill="#f5afc5"/>
  </g>

  <!-- Right ear -->
  <g transform="rotate(11, 242, 143)">
    <ellipse cx="242" cy="75" rx="27" ry="70" fill="#e8e8e6" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <ellipse cx="242" cy="73" rx="14.5" ry="54" fill="#f5afc5"/>
  </g>

  <!-- ══════════════════════════════════════════
       BODY / TUXEDO — drawn behind head
  ══════════════════════════════════════════ -->

  <!-- Jacket body -->
  <path d="M125 286 Q200 310 275 286 L295 460 L105 460 Z" fill="#111111"/>

  <!-- Left lapel -->
  <path d="M125 286 L178 308 L162 358 L105 392 L105 328 Z" fill="#1b1b1b"/>
  <!-- Left lapel notch shadow -->
  <path d="M125 286 L152 286 L178 308 Z" fill="#0a0a0a"/>

  <!-- Right lapel -->
  <path d="M275 286 L222 308 L238 358 L295 392 L295 328 Z" fill="#1b1b1b"/>
  <!-- Right lapel notch shadow -->
  <path d="M275 286 L248 286 L222 308 Z" fill="#0a0a0a"/>

  <!-- White shirt / vest panel -->
  <path d="M178 308 Q200 320 222 308 L228 378 Q200 392 172 378 Z" fill="#f0f0ee"/>

  <!-- Shirt buttons -->
  <circle cx="200" cy="326" r="2.5" fill="#c8c8c4"/>
  <circle cx="200" cy="343" r="2.5" fill="#c8c8c4"/>
  <circle cx="200" cy="360" r="2.5" fill="#c8c8c4"/>

  <!-- ══════════════════════════════════════════
       LEFT ARM — jacket sleeve, relaxed
  ══════════════════════════════════════════ -->
  <g transform="rotate(-9, 130, 316)">
    <!-- Sleeve -->
    <rect x="109" y="316" width="42" height="98" rx="21" fill="#111111"/>
    <!-- Shirt cuff -->
    <rect x="107" y="395" width="46" height="14" rx="7" fill="#f0f0ee"/>
    <!-- Paw -->
    <ellipse cx="130" cy="426" rx="23" ry="17" fill="#e8e8e6" stroke="#111" stroke-width="2"/>
    <!-- Knuckle creases -->
    <path d="M116 421 Q122 412 129 416" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M124 417 Q130 408 137 413" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M132 418 Q138 410 144 415" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ══════════════════════════════════════════
       PLAYING CARDS — drawn before right arm so paw overlaps
  ══════════════════════════════════════════ -->

  <!-- Card: K♥  (behind, left) -->
  <g transform="rotate(-17, 338, 382)">
    <rect x="296" y="316" width="48" height="70" rx="5" fill="#fafaf6" stroke="#222" stroke-width="2"/>
    <!-- Corner rank top-left -->
    <text x="302" y="333" font-size="13" font-weight="bold" font-family="Georgia,'Times New Roman',serif" fill="#cc1111">K</text>
    <!-- Suit top-left -->
    <text x="302" y="346" font-size="10" font-family="Georgia,'Times New Roman',serif" fill="#cc1111">♥</text>
    <!-- Centre suit -->
    <text x="320" y="372" font-size="22" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" fill="#cc1111">♥</text>
    <!-- Corner rank bottom-right (rotated) -->
    <text x="339" y="385" font-size="13" font-weight="bold" font-family="Georgia,'Times New Roman',serif" fill="#cc1111" transform="rotate(180 339 379)">K</text>
  </g>

  <!-- Card: A♠  (front) -->
  <g transform="rotate(7, 338, 382)">
    <rect x="306" y="316" width="48" height="70" rx="5" fill="white" stroke="#222" stroke-width="2"/>
    <!-- Corner rank top-left -->
    <text x="312" y="333" font-size="13" font-weight="bold" font-family="Georgia,'Times New Roman',serif" fill="#111">A</text>
    <!-- Suit top-left -->
    <text x="312" y="346" font-size="10" font-family="Georgia,'Times New Roman',serif" fill="#111">♠</text>
    <!-- Centre suit (large) -->
    <text x="330" y="372" font-size="22" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" fill="#111">♠</text>
    <!-- Corner rank bottom-right (rotated) -->
    <text x="349" y="385" font-size="13" font-weight="bold" font-family="Georgia,'Times New Roman',serif" fill="#111" transform="rotate(180 349 379)">A</text>
  </g>

  <!-- ══════════════════════════════════════════
       RIGHT ARM — sleeve then paw over cards
  ══════════════════════════════════════════ -->

  <!-- Sleeve (thick stroke = rounded arm shape) -->
  <path d="M262 308 C294 322 328 348 342 384" stroke="#111111" stroke-width="50" stroke-linecap="round" fill="none"/>
  <!-- Sleeve inner sheen -->
  <path d="M262 308 C294 322 328 348 342 384" stroke="#181818" stroke-width="38" stroke-linecap="round" fill="none"/>
  <!-- Shirt cuff at wrist -->
  <ellipse cx="346" cy="390" rx="26" ry="12" fill="#f0f0ee" stroke="#111" stroke-width="1.5" transform="rotate(-30, 346, 390)"/>
  <!-- Paw -->
  <ellipse cx="350" cy="398" rx="24" ry="18" fill="#e8e8e6" stroke="#111" stroke-width="2.5"/>
  <!-- Knuckle creases on paw -->
  <path d="M336 392 Q342 382 350 387" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M344 388 Q351 378 358 384" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M353 390 Q358 381 363 387" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════
       HEAD
  ══════════════════════════════════════════ -->

  <!-- Head shadow (depth) -->
  <ellipse cx="203" cy="208" rx="90" ry="82" fill="rgba(0,0,0,0.08)"/>
  <!-- Head -->
  <ellipse cx="200" cy="205" rx="90" ry="82" fill="#f0f0ee" stroke="#111" stroke-width="3"/>

  <!-- ══════════════════════════════════════════
       FACE
  ══════════════════════════════════════════ -->

  <!-- Cheek blush -->
  <ellipse cx="148" cy="224" rx="21" ry="11" fill="#f9b8c8" opacity="0.38"/>
  <ellipse cx="252" cy="224" rx="21" ry="11" fill="#f9b8c8" opacity="0.38"/>

  <!-- Left eye -->
  <ellipse cx="172" cy="193" rx="21" ry="23" fill="white" stroke="#111" stroke-width="2.5"/>
  <ellipse cx="172" cy="195" rx="14" ry="16" fill="#c8a84b"/>
  <ellipse cx="174" cy="195" rx="8.5" ry="9.5" fill="#0a0300"/>
  <circle  cx="180" cy="188" r="4.5" fill="white"/>
  <circle  cx="168" cy="199" r="1.5" fill="rgba(255,255,255,0.35)"/>

  <!-- Right eye -->
  <ellipse cx="228" cy="193" rx="21" ry="23" fill="white" stroke="#111" stroke-width="2.5"/>
  <ellipse cx="228" cy="195" rx="14" ry="16" fill="#c8a84b"/>
  <ellipse cx="230" cy="195" rx="8.5" ry="9.5" fill="#0a0300"/>
  <circle  cx="236" cy="188" r="4.5" fill="white"/>
  <circle  cx="224" cy="199" r="1.5" fill="rgba(255,255,255,0.35)"/>

  <!-- Eyebrow left — raised / confident -->
  <path d="M152 174 Q172 166 190 170" stroke="#888" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Eyebrow right — slightly arched (sly) -->
  <path d="M210 170 Q228 163 248 170" stroke="#888" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Nose bridge -->
  <line x1="200" y1="210" x2="200" y2="222" stroke="#d8d8d4" stroke-width="1.5"/>
  <!-- Nose -->
  <ellipse cx="200" cy="226" rx="9" ry="6" fill="#f07888"/>
  <!-- Nose highlight -->
  <ellipse cx="197" cy="223" rx="3.5" ry="2" fill="rgba(255,255,255,0.5)"/>

  <!-- Sly smirk — right side curves up -->
  <path d="M182 237 Q198 253 222 244" stroke="#888" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Right dimple -->
  <circle cx="222" cy="244" r="2.5" fill="#d0d0cc"/>

  <!-- Teeth peek (top row slightly showing) -->
  <path d="M188 240 Q200 246 214 240" fill="#f8f8f8" stroke="#e0e0dc" stroke-width="1.2"/>

  <!-- ══════════════════════════════════════════
       BOW TIE
  ══════════════════════════════════════════ -->

  <!-- Left wing -->
  <path d="M168 295 L190 285 L190 305 Z" fill="#c8a84b" stroke="#9a7830" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right wing -->
  <path d="M232 295 L210 285 L210 305 Z" fill="#c8a84b" stroke="#9a7830" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Centre knot -->
  <ellipse cx="200" cy="295" rx="12" ry="9" fill="#c8a84b" stroke="#9a7830" stroke-width="1.5"/>
  <!-- Knot highlight -->
  <ellipse cx="197" cy="291" rx="5" ry="3" fill="#e8c870" opacity="0.5"/>

</svg>
