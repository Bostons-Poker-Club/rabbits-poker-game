<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="#040e07"/>
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="46" fill="#091c10"/>
  <!-- Gold ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#c8a84b" stroke-width="2.5"/>

  <!-- Left ear -->
  <g transform="rotate(-11, 33, 47)">
    <ellipse cx="33" cy="21" rx="10" ry="27" fill="#e8e8e6" stroke="#111" stroke-width="1.5"/>
    <ellipse cx="33" cy="20" rx="5.5" ry="21" fill="#f5afc5"/>
  </g>
  <!-- Right ear -->
  <g transform="rotate(11, 67, 47)">
    <ellipse cx="67" cy="21" rx="10" ry="27" fill="#e8e8e6" stroke="#111" stroke-width="1.5"/>
    <ellipse cx="67" cy="20" rx="5.5" ry="21" fill="#f5afc5"/>
  </g>

  <!-- Head -->
  <ellipse cx="50" cy="58" rx="34" ry="31" fill="#f0f0ee" stroke="#111" stroke-width="2"/>

  <!-- Left eye -->
  <ellipse cx="38" cy="52" rx="8" ry="9" fill="white" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="38" cy="53" rx="5.5" ry="6" fill="#c8a84b"/>
  <ellipse cx="39" cy="53" rx="3.2" ry="3.5" fill="#0a0300"/>
  <circle  cx="42" cy="50" r="1.8" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="62" cy="52" rx="8" ry="9" fill="white" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="62" cy="53" rx="5.5" ry="6" fill="#c8a84b"/>
  <ellipse cx="63" cy="53" rx="3.2" ry="3.5" fill="#0a0300"/>
  <circle  cx="66" cy="50" r="1.8" fill="white"/>

  <!-- Eyebrows -->
  <path d="M30 44 Q38 40 44 43" stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M56 43 Q62 40 70 43" stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="50" cy="62" rx="3.5" ry="2.5" fill="#f07888"/>

  <!-- Smirk -->
  <path d="M43 67 Q50 73 58 70" stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Bow tie (small) -->
  <path d="M41 78 L48 74 L48 82 Z" fill="#c8a84b"/>
  <path d="M59 78 L52 74 L52 82 Z" fill="#c8a84b"/>
  <ellipse cx="50" cy="78" rx="4.5" ry="3.5" fill="#c8a84b"/>
</svg>
