<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RabbsRoom – Table</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="table-page">

<!-- Header -->
<header class="table-header">
  <div class="table-info-bar">
    <span><a href="/lobby.html" style="color:var(--gold)">← Lobby</a></span>
    <span id="hdr-table-name" style="color:var(--text)">Loading…</span>
    <span id="hdr-blinds" style="color:var(--text-dim)"></span>
    <span id="hdr-street" style="color:var(--chip-green)"></span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span class="jackpot-mini" id="hdr-jackpot">🏆 $0</span>
    <span style="color:var(--text-dim);font-size:.8rem" id="hdr-jackpot-timer"></span>
    <span style="color:var(--gold);font-size:.9rem">🪙 <strong id="hdr-chips">–</strong></span>
    <button class="btn btn-sm btn-outline" onclick="toggleChat()" id="chat-toggle">Chat</button>
  </div>
</header>

<!-- Main area: table + chat -->
<div class="table-main">
  <!-- Poker Table -->
  <div class="poker-area" id="poker-area">
    <div class="poker-table-wrap" id="table-wrap">
      <div class="poker-table-oval" id="poker-oval">
        <!-- Community cards + pot -->
        <div class="community-area">
          <div class="community-cards" id="community-cards"></div>
          <div class="pot-display">
            <div class="pot-amount" id="pot-amount">$0</div>
            <div class="pot-label">POT</div>
          </div>
        </div>
        <!-- Player seats injected by JS around the oval -->
        <div class="seats-container" id="seats-container"></div>
      </div>
    </div>

    <!-- Hand result overlay -->
    <div class="hand-result-overlay hidden" id="hand-result-overlay">
      <div class="hand-result-box">
        <div id="hr-winner-name" class="winner-name"></div>
        <div id="hr-hand-name" class="hand-name"></div>
        <div id="hr-amount" class="won-amount"></div>
        <div id="hr-cards" class="winner-cards"></div>
        <div id="hr-rake" style="font-size:.75rem;color:rgba(255,255,255,.5);margin-top:6px"></div>
      </div>
    </div>

    <!-- Host Controls Panel -->
    <div id="host-controls" style="display:none;position:absolute;top:8px;right:8px;background:rgba(10,25,15,.95);border:1px solid var(--chip-green);border-radius:8px;padding:10px 14px;min-width:180px;z-index:50">
      <div style="color:var(--chip-green);font-size:.75rem;font-weight:700;margin-bottom:8px">🎰 HOST CONTROLS</div>
      <div id="host-player-list" style="font-size:.8rem"></div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-header">Table Chat</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Say something…" maxlength="200">
      <button onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<!-- My Cards + Actions -->
<div class="my-cards-area" id="my-cards-area">
  <!-- Shot clock -->
  <div class="shot-clock" id="shot-clock" style="display:none">
    <svg width="44" height="44" viewBox="0 0 44 44">
      <circle class="shot-clock-track" cx="22" cy="22" r="18"/>
      <circle class="shot-clock-fill" id="sc-fill" cx="22" cy="22" r="18"/>
    </svg>
    <div class="shot-clock-number" id="sc-number">30</div>
  </div>

  <!-- My hole cards -->
  <div class="my-hole-cards" id="my-hole-cards">
    <div style="color:var(--text-dim);font-size:.85rem;align-self:center">Waiting for hand…</div>
  </div>

  <!-- Action buttons -->
  <div class="action-area" id="action-area">
    <button class="action-btn btn-fold" id="btn-fold" onclick="act('fold')" disabled>
      FOLD
    </button>
    <button class="action-btn btn-check" id="btn-check" onclick="act('check')" disabled>
      CHECK
    </button>
    <button class="action-btn btn-call" id="btn-call" onclick="act('call')" disabled>
      CALL<span class="sub" id="call-amount"></span>
    </button>
    <div class="raise-controls">
      <button class="action-btn btn-raise" id="btn-raise" onclick="act('raise')" disabled>
        RAISE<span class="sub" id="raise-display">–</span>
      </button>
      <input type="range" id="raise-slider" min="0" max="0" value="0" oninput="onRaiseSlider()">
      <input type="number" id="raise-input" style="width:72px;padding:6px;background:rgba(255,255,255,.1);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)" oninput="onRaiseInput()">
      <button class="action-btn btn-allin" id="btn-allin" onclick="setAllIn();act('raise')" disabled
        style="background:linear-gradient(135deg,#8b0000,#c0392b);border-color:#e74c3c;font-size:.75rem;padding:0 10px;min-width:60px">
        ALL IN
      </button>
    </div>
    <button class="break-btn" id="btn-break" onclick="requestBreak()">☕ Break (3)</button>
    <button class="ptt-btn" id="ptt-btn" onmousedown="startPTT()" onmouseup="stopPTT()" ontouchstart="startPTT(event)" ontouchend="stopPTT()" ontouchcancel="stopPTT()">🎙 Hold to Talk</button>
    <button class="btn btn-sm btn-outline" onclick="testMic()" title="Test microphone" style="font-size:.75rem;padding:4px 8px" id="mic-test-btn">🎚 Mic</button>
    <button class="btn btn-sm btn-outline" onclick="leaveTable()" style="margin-left:auto">Leave</button>
  </div>
</div>

<!-- Leave confirmation modal -->
<div class="modal-overlay hidden" id="leave-confirm-modal">
  <div class="modal" style="max-width:400px;text-align:center">
    <h2 style="color:var(--gold)">Leave Table?</h2>
    <p style="color:var(--text);margin:12px 0 6px">Please cash out before leaving.</p>
    <p style="color:var(--text-dim);font-size:.85rem;margin-bottom:20px">Your chips will be returned to your account balance.</p>
    <div class="modal-footer" style="justify-content:center;gap:12px">
      <button class="btn btn-outline" onclick="stayAtTable()">Stay</button>
      <button class="btn btn-gold" onclick="cashOutAndLeave()">Cash Out &amp; Leave</button>
    </div>
  </div>
</div>

<!-- Reconnecting banner -->
<div id="reconnecting-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#b8240a;color:#fff;font-weight:700;font-size:.9rem;text-align:center;padding:10px;letter-spacing:.03em">
  ⚠️ Connection lost — reconnecting…
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/table.js"></script>
<script>
// Inline broadcast listener — guaranteed to fire regardless of JS module scope
(function waitAndBind() {
  var s = window.tableSocket;
  if (s) {
    s.on('broadcast_message', function(data) {
      console.log('[table inline] broadcast_message:', data);
      alert('📢 Message from Admin: ' + data.message);
    });
  } else {
    setTimeout(waitAndBind, 100);
  }
})();
</script>
</body>
</html>
