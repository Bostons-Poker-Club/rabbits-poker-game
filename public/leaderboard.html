<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RabbsRoom – Leaderboard</title>
  <meta name="theme-color" content="#c8a84b">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="lobby-page">

<header class="lobby-header">
  <div class="logo" style="display:flex;align-items:center;gap:8px">
    <a href="/lobby.html" style="color:inherit;text-decoration:none;display:flex;align-items:center;gap:8px">
      <img src="/images/logo.svg" alt="" style="width:36px;height:auto">
      RabbsRoom
    </a>
  </div>
  <div class="player-info">
    <span id="header-username" style="color:var(--text-dim)"></span>
    <a href="/lobby.html"><button class="btn btn-sm btn-outline">← Lobby</button></a>
  </div>
</header>

<div style="max-width:860px;margin:0 auto;padding:20px 16px">
  <div style="text-align:center;margin-bottom:24px">
    <h1 style="color:var(--gold);font-size:1.8rem;margin:0 0 4px">🏆 Leaderboard</h1>
    <p style="color:var(--text-dim);font-size:.88rem;margin:0">Boston Poker Club — All-Time Rankings</p>
  </div>

  <!-- My Stats Card (own data only — never shown to others) -->
  <div id="my-stats-card" style="display:none;background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.3);border-radius:12px;padding:16px 20px;margin-bottom:24px">
    <div style="color:var(--gold);font-weight:700;font-size:.8rem;letter-spacing:.06em;margin-bottom:10px">YOUR STATS</div>
    <div id="my-stats-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px"></div>
  </div>

  <!-- Category Tabs -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
    <button id="tab-sessions" class="lb-tab active" onclick="loadLeaderboard('sessions_played',this)">📅 Sessions</button>
    <button id="tab-winrate" class="lb-tab" onclick="loadLeaderboard('win_rate',this)">📈 Win Rate</button>
    <!-- Admin-only financial tabs -->
    <button id="tab-chips" class="lb-tab" style="display:none" onclick="loadLeaderboard('total_won',this)">💰 Chips Won</button>
    <button id="tab-pot" class="lb-tab" style="display:none" onclick="loadLeaderboard('biggest_pot',this)">🎯 Biggest Pot</button>
  </div>

  <!-- Leaderboard Table -->
  <div id="lb-table-wrap">
    <div class="empty-state">Loading…</div>
  </div>

  <div style="text-align:center;margin-top:20px">
    <button class="btn btn-sm btn-outline" onclick="loadLeaderboard(currentSortBy,null,true)" style="font-size:.8rem">↻ Refresh</button>
    <span id="lb-admin-reset" style="display:none;margin-left:12px">
      <button class="btn btn-sm btn-outline" onclick="resetLeaderboard()" style="font-size:.8rem;border-color:var(--red);color:var(--red)">🗑 Reset Season</button>
    </span>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
requireAuth();
const user = getUser();

if (user) {
  document.getElementById('header-username').textContent = user.username || user.nickname || '';
  if (user.isAdmin) {
    document.getElementById('lb-admin-reset').style.display = '';
    document.getElementById('tab-chips').style.display = '';
    document.getElementById('tab-pot').style.display = '';
    // Admin defaults to chips-won sort; activate that tab
    document.getElementById('tab-sessions').classList.remove('active');
    document.getElementById('tab-chips').classList.add('active');
  }
}

let currentSortBy = user?.isAdmin ? 'total_won' : 'sessions_played';
let isAdminView = false; // set from API response

function fmt(n) { return Number(n || 0).toLocaleString(); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function initials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function avatarColor(name) {
  const colors = ['#2ecc71','#3498db','#e74c3c','#9b59b6','#f39c12','#1abc9c'];
  return colors[(name || '').charCodeAt(0) % colors.length] || colors[0];
}

function playerAvatarHtml(r) {
  const name = r.nickname || r.username || '?';
  const fallback = `<div style="width:36px;height:36px;border-radius:50%;background:${avatarColor(name)};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#111;flex-shrink:0">${initials(name)}</div>`;
  if (r.avatar_url) {
    return `<img src="${esc(r.avatar_url)}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.replaceWith(document.createRange().createContextualFragment('${fallback.replace(/'/g, "\\'")}'))">`;
  }
  return fallback;
}

async function loadLeaderboard(by, btn, force) {
  if (by === 'win_rate') by = 'hands_won';
  currentSortBy = by;

  if (btn) {
    document.querySelectorAll('.lb-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  document.getElementById('lb-table-wrap').innerHTML = '<div class="empty-state">Loading…</div>';

  try {
    const token = localStorage.getItem('rp_token') || sessionStorage.getItem('rp_token');
    const res = await fetch(`/api/leaderboard?by=${by}`, { headers: { Authorization: 'Bearer ' + token } });
    const json = await res.json();
    const { leaderboard } = json;
    isAdminView = !!json.isAdmin;

    if (!leaderboard?.length) {
      document.getElementById('lb-table-wrap').innerHTML = '<div class="empty-state">No data yet — play some hands!</div>';
      return;
    }

    let tableHtml;
    if (isAdminView) {
      // Admin: show financial columns
      const colLabel = { total_won: 'Total Won', biggest_pot: 'Biggest Pot', sessions_played: 'Sessions', hands_won: 'Win Rate' }[by] || 'Total Won';
      const rows = leaderboard.map((r, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `<span style="color:var(--text-dim)">${i+1}</span>`;
        const isMe = r.user_id === user?.id;
        const displayName = r.nickname ? `${esc(r.nickname)} <span style="color:var(--text-dim);font-size:.78rem">(${esc(r.username)})</span>` : esc(r.username);
        const mainVal = by === 'hands_won'
          ? `${r.win_rate}% <span style="color:var(--text-dim);font-size:.78rem">(${fmt(r.hands_won)}/${fmt(r.hands_played)})</span>`
          : by === 'sessions_played' ? fmt(r.sessions_played)
          : `$${fmt(r[by])}`;
        return `
          <tr class="${isMe ? 'lb-me-row' : ''}">
            <td style="text-align:center;font-size:1.1rem;width:44px">${medal}</td>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                ${playerAvatarHtml(r)}
                <div>
                  <div style="font-weight:700;color:${isMe ? 'var(--gold)' : 'var(--text)'}">${displayName}${isMe ? ' <span style="font-size:.7rem;color:var(--chip-green)">(You)</span>' : ''}</div>
                  ${r.favorite_hand ? `<div style="font-size:.72rem;color:var(--text-dim)">${esc(r.favorite_hand)}</div>` : ''}
                </div>
              </div>
            </td>
            <td style="text-align:right;font-weight:700;color:var(--chip-green);font-size:.95rem">${mainVal}</td>
            <td style="text-align:right;color:var(--text-dim);font-size:.8rem">${fmt(r.hands_played)} hands</td>
          </tr>`;
      }).join('');
      tableHtml = `
        <table class="lb-table">
          <thead><tr><th></th><th>Player</th><th style="text-align:right">${colLabel}</th><th style="text-align:right">Hands</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    } else {
      // Non-admin: rank, nickname+avatar, sessions, win rate only — no dollar amounts
      const rows = leaderboard.map((r, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `<span style="color:var(--text-dim)">${i+1}</span>`;
        const isMe = r.user_id === user?.id;
        const displayName = r.nickname
          ? `<span style="font-weight:700;color:${isMe ? 'var(--gold)' : 'var(--text)'}">${esc(r.nickname)}</span>`
          : `<span style="font-weight:700;color:${isMe ? 'var(--gold)' : 'var(--text)'}">${esc(r.username)}</span>`;
        return `
          <tr class="${isMe ? 'lb-me-row' : ''}">
            <td style="text-align:center;font-size:1.1rem;width:44px">${medal}</td>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                ${playerAvatarHtml(r)}
                <div>
                  ${displayName}${isMe ? ' <span style="font-size:.7rem;color:var(--chip-green)">(You)</span>' : ''}
                  ${r.favorite_hand ? `<div style="font-size:.72rem;color:var(--text-dim)">${esc(r.favorite_hand)}</div>` : ''}
                </div>
              </div>
            </td>
            <td style="text-align:right;color:var(--text);font-size:.88rem">${fmt(r.sessions_played)}</td>
            <td style="text-align:right;color:var(--chip-green);font-weight:700;font-size:.88rem">${r.win_rate}%</td>
          </tr>`;
      }).join('');
      tableHtml = `
        <table class="lb-table">
          <thead><tr><th></th><th>Player</th><th style="text-align:right">Sessions</th><th style="text-align:right">Win Rate</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    document.getElementById('lb-table-wrap').innerHTML = tableHtml;
  } catch (err) {
    document.getElementById('lb-table-wrap').innerHTML = `<div class="empty-state" style="color:var(--red)">${err.message}</div>`;
  }
}

async function loadMyStats() {
  try {
    const token = localStorage.getItem('rp_token') || sessionStorage.getItem('rp_token');
    const res = await fetch(`/api/players/${user.id}/stats`, { headers: { Authorization: 'Bearer ' + token } });
    const { stats } = await res.json();
    if (!stats) return;

    document.getElementById('my-stats-card').style.display = '';

    const items = [
      { label: 'Hands Played', value: fmt(stats.hands_played) },
      { label: 'Hands Won', value: fmt(stats.hands_won) },
      { label: 'Win Rate', value: `${stats.win_rate}%` },
      { label: 'Total Won', value: `$${fmt(stats.total_won)}` },
      { label: 'Biggest Pot', value: `$${fmt(stats.biggest_pot)}` },
      { label: 'Sessions', value: fmt(stats.sessions_played) },
      { label: 'Fav Hand', value: stats.favorite_hand || '–' },
    ];

    document.getElementById('my-stats-grid').innerHTML = items.map(it => `
      <div style="text-align:center">
        <div style="color:var(--chip-green);font-weight:700;font-size:1rem">${it.value}</div>
        <div style="color:var(--text-dim);font-size:.7rem">${it.label}</div>
      </div>`).join('');
  } catch {}
}

async function resetLeaderboard() {
  if (!confirm('Reset the leaderboard? This clears all player stats permanently.')) return;
  const token = localStorage.getItem('rp_token') || sessionStorage.getItem('rp_token');
  const res = await fetch('/api/admin/leaderboard/reset', { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
  if (res.ok) { alert('Leaderboard reset.'); loadLeaderboard(currentSortBy, null, true); }
}

// Init
loadLeaderboard(currentSortBy, null);
if (user) loadMyStats();

// Auto-refresh every 30s
setInterval(() => loadLeaderboard(currentSortBy, null, true), 30000);
</script>
<script src="/js/maintenance-banner.js"></script>
</body>
</html>
