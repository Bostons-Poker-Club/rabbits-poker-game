<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RabbsRoom – Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>🐇 RabbsRoom</h1>
      <p>Boston's Private Poker Club</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="showTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="form-login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="btn btn-gold btn-full" onclick="doLogin()">Sign In</button>
      <div id="login-error" class="error-msg"></div>
    </div>

    <!-- Register Form -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label>Full Name <span style="color:var(--text-dim)">(real name)</span></label>
        <input type="text" id="reg-fullname" placeholder="John Smith" maxlength="80" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Nickname <span style="color:var(--gold)">*</span></label>
        <input type="text" id="reg-nickname" placeholder="Table nickname (e.g. Maverick)" maxlength="40">
      </div>
      <div class="form-group">
        <label>Username <span style="color:var(--gold)">*</span></label>
        <input type="text" id="reg-username" placeholder="Login username" maxlength="30" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email <span style="color:var(--gold)">*</span></label>
        <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="reg-phone" placeholder="(617) 555-0100" maxlength="20" autocomplete="tel">
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--gold)">*</span></label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password">
      </div>
      <button class="btn btn-gold btn-full" onclick="doRegister()">Create Account</button>
      <p style="text-align:center;color:var(--text-dim);font-size:.8rem;margin-top:12px">
        You start with 0 chips — contact admin to receive chips before playing.
      </p>
      <div id="reg-error" class="error-msg"></div>
      <div id="reg-success" class="success-msg"></div>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (localStorage.getItem('rp_token')) window.location.href = '/lobby.html';

  function showTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  }

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    try {
      await login(username, password);
      window.location.href = '/lobby.html';
    } catch (e) {
      errEl.textContent = e.message;
    }
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const nickname = document.getElementById('reg-nickname').value.trim();
    const phone    = document.getElementById('reg-phone').value.trim();
    const errEl = document.getElementById('reg-error');
    const okEl  = document.getElementById('reg-success');
    errEl.textContent = '';
    okEl.textContent  = '';
    if (!nickname) { errEl.textContent = 'Nickname is required'; return; }
    try {
      const full_name = document.getElementById('reg-fullname').value.trim();
      await register(username, email, password, nickname, phone, full_name);
      window.location.href = '/lobby.html';
    } catch (e) {
      errEl.textContent = e.message;
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginVisible = document.getElementById('form-login').style.display !== 'none';
      if (loginVisible) doLogin(); else doRegister();
    }
  });
</script>
</body>
</html>
