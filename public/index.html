<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RabbsRoom – Login</title>
  <meta name="theme-color" content="#c8a84b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RabbsRoom">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/images/logo.svg" alt="Boston Poker Club" style="width:110px;height:auto;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto">
      <h1 style="font-size:1.6rem">RabbsRoom</h1>
      <p>Boston's Private Poker Club</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="showTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form id="form-login" onsubmit="event.preventDefault(); doLogin()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter username" autocomplete="username" inputmode="text">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePw(this,'login-password')" aria-label="Show password">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-gold btn-full" id="btn-login">Sign In</button>
      <div id="login-error" class="error-msg"></div>
    </form>

    <div id="host-apply-link" style="text-align:center;margin-top:10px;font-size:.82rem;color:var(--text-dim)">
      Interested in hosting tables?
      <a href="/host-apply.html" style="color:var(--gold);font-weight:600">Apply to be a Host →</a>
    </div>

    <!-- 2FA Verification Screen -->
    <div id="form-2fa" style="display:none">
      <div style="text-align:center;margin-bottom:18px">
        <div style="font-size:2.2rem;margin-bottom:8px">🔐</div>
        <h3 style="color:var(--gold);margin:0 0 6px;font-size:1.1rem">Two-Factor Verification</h3>
        <p id="tfa-hint" style="color:var(--text-dim);font-size:.85rem;margin:0">Enter the 6-digit code sent to your phone and email.</p>
      </div>
      <div class="form-group">
        <label>Verification Code</label>
        <input type="text" id="tfa-code" placeholder="000 000" maxlength="7" inputmode="numeric"
          autocomplete="one-time-code"
          style="text-align:center;font-size:1.4rem;letter-spacing:.15em;font-weight:700">
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--text-dim);margin-bottom:14px;cursor:pointer">
        <input type="checkbox" id="tfa-remember" style="width:16px;height:16px;accent-color:var(--gold)">
        Remember this device for 30 days
      </label>
      <button class="btn btn-gold btn-full" id="btn-verify-2fa" onclick="doVerify2FA()">Verify →</button>
      <div id="tfa-error" class="error-msg"></div>
      <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:.8rem">
        <button onclick="doResend2FA()" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:.8rem;padding:0">↺ Resend code</button>
        <button onclick="showBackupCodeForm()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.8rem;padding:0">Use backup code</button>
      </div>
      <!-- Backup code input (hidden by default) -->
      <div id="backup-code-form" style="display:none;margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
        <div class="form-group">
          <label style="font-size:.82rem;color:var(--text-dim)">Backup Code (format: XXXX-XXXX)</label>
          <input type="text" id="tfa-backup-code" placeholder="A3F7-B2K9" maxlength="9"
            style="text-align:center;font-size:1.1rem;letter-spacing:.1em;text-transform:uppercase">
        </div>
        <button class="btn btn-outline btn-full" onclick="doVerify2FA(true)">Use Backup Code</button>
        <div id="tfa-backup-warning" style="display:none;background:rgba(255,160,0,.12);border:1px solid rgba(255,160,0,.4);border-radius:8px;padding:10px 12px;margin-top:10px;font-size:.82rem;color:#f0a000"></div>
      </div>
      <button onclick="cancelTwoFactor()" style="display:block;width:100%;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.8rem;margin-top:10px;padding:4px 0">← Back to login</button>
    </div>

    <!-- Register Form -->
    <form id="form-register" style="display:none" onsubmit="event.preventDefault(); doRegister()">
      <div class="auth-name-row" style="display:flex;gap:10px">
        <div class="form-group" style="flex:1">
          <label>First Name <span style="color:var(--gold)">*</span><br><span style="color:var(--text-dim);font-size:.7rem;font-weight:400">as on government ID</span></label>
          <input type="text" id="reg-firstname" placeholder="John" maxlength="40" autocomplete="given-name">
        </div>
        <div class="form-group" style="flex:1">
          <label>Last Name <span style="color:var(--gold)">*</span><br><span style="color:var(--text-dim);font-size:.7rem;font-weight:400">as on government ID</span></label>
          <input type="text" id="reg-lastname" placeholder="Smith" maxlength="40" autocomplete="family-name">
        </div>
      </div>
      <div class="form-group">
        <label>Nickname <span style="color:var(--gold)">*</span> <span style="color:var(--text-dim);font-size:.75rem;font-weight:400">— shown at the table</span></label>
        <input type="text" id="reg-nickname" placeholder="Maverick" maxlength="40" autocomplete="nickname">
      </div>
      <div class="form-group">
        <label>Username <span style="color:var(--gold)">*</span></label>
        <input type="text" id="reg-username" placeholder="Login username" maxlength="30" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email <span style="color:var(--gold)">*</span> <span style="color:var(--text-dim);font-size:.75rem;font-weight:400">— for alerts</span></label>
        <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Phone <span style="color:var(--gold)">*</span> <span style="color:var(--text-dim);font-size:.75rem;font-weight:400">— 10-digit US number for SMS</span></label>
        <input type="tel" id="reg-phone" placeholder="6175550100" maxlength="20" autocomplete="tel">
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--gold)">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw(this,'reg-password')" aria-label="Show password">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-gold btn-full" id="btn-register">Create Account</button>
      <p style="text-align:center;color:var(--text-dim);font-size:.8rem;margin-top:12px">
        You start with 0 chips — admin will add chips after verifying your identity.
      </p>
      <div id="reg-error" class="error-msg"></div>
      <div id="reg-success" class="success-msg"></div>
    </form>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (sessionStorage.getItem('rp_token')) window.location.href = '/lobby.html';

  // Show timeout message if redirected from session expiry
  (function () {
    const p = new URLSearchParams(window.location.search);
    if (p.get('reason') === 'timeout') {
      const el = document.getElementById('login-error');
      if (el) { el.textContent = 'You were logged out due to inactivity.'; el.style.display = 'block'; }
    }
  })();

  function showTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  }

  // ── Device fingerprint ──────────────────────────────────────────────────────
  let _deviceId = localStorage.getItem('rp_device_id');
  if (!_deviceId) {
    _deviceId = 'dev-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 9);
    localStorage.setItem('rp_device_id', _deviceId);
  }

  // ── 2FA state ─────────────────────────────────────────────────────────────
  let _pendingToken = null;

  async function doLogin() {
    const btn = document.getElementById('btn-login');
    const errEl = document.getElementById('login-error');
    if (btn.disabled) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spinner"></span> Signing In…';
    errEl.textContent = '';
    try {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const data = await apiFetch('/api/auth/login', {
        method: 'POST',
        body: { username, password, deviceId: _deviceId }
      });

      if (data.requires2fa) {
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
        _pendingToken = data.pendingToken;
        document.getElementById('tfa-hint').textContent = data.hint || 'Enter the 6-digit code sent to your phone and email.';
        document.getElementById('form-login').style.display  = 'none';
        document.getElementById('host-apply-link').style.display = 'none';
        document.getElementById('form-2fa').style.display   = '';
        document.getElementById('tfa-code').focus();
        if (data.backupCodesLeft !== undefined && data.backupCodesLeft < 3 && data.backupCodesLeft > 0) {
          showBackupWarning(`Only ${data.backupCodesLeft} backup code${data.backupCodesLeft !== 1 ? 's' : ''} remaining. Ask admin to regenerate.`);
        }
        return;
      }

      saveAuth(data.token, data.user);
      window.location.href = '/lobby.html';
    } catch (e) {
      errEl.textContent = e.message;
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }

  async function doVerify2FA(useBackup = false) {
    const btn = document.getElementById('btn-verify-2fa');
    const errEl = document.getElementById('tfa-error');
    if (btn && btn.disabled) return;
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span> Verifying…'; }
    errEl.textContent = '';
    const rawCode = useBackup
      ? (document.getElementById('tfa-backup-code').value.trim().toUpperCase())
      : (document.getElementById('tfa-code').value.replace(/\s/g, ''));
    if (!rawCode) {
      errEl.textContent = 'Please enter a code.';
      if (btn) { btn.disabled = false; btn.innerHTML = 'Verify →'; }
      return;
    }
    const rememberDevice = document.getElementById('tfa-remember').checked;
    try {
      const data = await apiFetch('/api/auth/2fa/verify', {
        method: 'POST',
        body: { pendingToken: _pendingToken, code: rawCode, rememberDevice, deviceId: _deviceId }
      });
      saveAuth(data.token, data.user);
      window.location.href = '/lobby.html';
    } catch (e) {
      errEl.textContent = e.message;
      if (btn) { btn.disabled = false; btn.innerHTML = 'Verify →'; }
    }
  }

  async function doResend2FA() {
    const errEl = document.getElementById('tfa-error');
    errEl.textContent = '';
    try {
      const data = await apiFetch('/api/auth/2fa/resend', { method: 'POST', body: { pendingToken: _pendingToken } });
      errEl.style.color = 'var(--chip-green)';
      errEl.textContent = data.hint || 'Code resent.';
      setTimeout(() => { errEl.textContent = ''; errEl.style.color = ''; }, 4000);
    } catch (e) {
      errEl.style.color = '';
      errEl.textContent = e.message;
    }
  }

  function cancelTwoFactor() {
    _pendingToken = null;
    document.getElementById('tfa-code').value = '';
    document.getElementById('tfa-backup-code').value = '';
    document.getElementById('tfa-error').textContent = '';
    document.getElementById('backup-code-form').style.display = 'none';
    document.getElementById('form-2fa').style.display = 'none';
    document.getElementById('form-login').style.display = '';
    document.getElementById('host-apply-link').style.display = '';
  }

  function showBackupCodeForm() {
    document.getElementById('backup-code-form').style.display = '';
    document.getElementById('tfa-backup-code').focus();
  }

  function showBackupWarning(msg) {
    const el = document.getElementById('tfa-backup-warning');
    if (el) { el.textContent = '⚠️ ' + msg; el.style.display = ''; }
  }

  async function doRegister() {
    const btn = document.getElementById('btn-register');
    const errEl = document.getElementById('reg-error');
    const okEl  = document.getElementById('reg-success');
    if (btn.disabled) return;
    errEl.textContent = '';
    okEl.textContent  = '';
    const firstName = document.getElementById('reg-firstname').value.trim();
    const lastName  = document.getElementById('reg-lastname').value.trim();
    const nickname  = document.getElementById('reg-nickname').value.trim();
    const username  = document.getElementById('reg-username').value.trim();
    const email     = document.getElementById('reg-email').value.trim();
    const phone     = document.getElementById('reg-phone').value.trim();
    const password  = document.getElementById('reg-password').value;
    if (!firstName) { errEl.textContent = 'Legal First Name is required'; return; }
    if (!lastName)  { errEl.textContent = 'Legal Last Name is required'; return; }
    if (!nickname)  { errEl.textContent = 'Nickname is required'; return; }
    if (!username)  { errEl.textContent = 'Username is required'; return; }
    if (!email)     { errEl.textContent = 'Email is required'; return; }
    if (!phone)     { errEl.textContent = 'Phone number is required for SMS alerts'; return; }
    if (!password)  { errEl.textContent = 'Password is required'; return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errEl.textContent = 'Please enter a valid email address'; return; }
    if (phone.replace(/\D/g, '').length !== 10) { errEl.textContent = 'Please enter a valid 10-digit US phone number'; return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spinner"></span> Creating Account…';
    const full_name = `${firstName} ${lastName}`;
    try {
      await register(username, email, password, nickname, phone, full_name);
      window.location.href = '/lobby.html';
    } catch (e) {
      errEl.textContent = e.message;
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  }

  // "Apply to Host" link shown below login tab
  document.getElementById('tab-login').addEventListener('click', () => {
    document.getElementById('host-apply-link').style.display = '';
  });
  document.getElementById('tab-register').addEventListener('click', () => {
    document.getElementById('host-apply-link').style.display = 'none';
  });

  // Password visibility toggle
  function togglePw(btn, id) {
    const inp = document.getElementById(id);
    const showing = inp.type === 'text';
    inp.type = showing ? 'password' : 'text';
    btn.textContent = showing ? '👁' : '🙈';
    btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  }

  // Scroll input into view when mobile keyboard opens
  document.addEventListener('focusin', e => {
    if (e.target.matches('input')) {
      setTimeout(() => e.target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
    }
  });

  // Enter key: only needed for 2FA (login/register handled by <form> submit)
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const tfaVisible = document.getElementById('form-2fa').style.display !== 'none';
    if (tfaVisible) {
      const backupOpen = document.getElementById('backup-code-form').style.display !== 'none';
      doVerify2FA(backupOpen);
    }
  });
</script>
<script src="/js/pwa.js"></script>
</body>
</html>
