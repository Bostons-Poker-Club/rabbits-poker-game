<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RabbsRoom – My Profile</title>
  <meta name="theme-color" content="#c8a84b">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="lobby-page">

<header class="lobby-header">
  <div class="logo" style="display:flex;align-items:center;gap:8px">
    <a href="/lobby.html" style="color:var(--gold);text-decoration:none">← Lobby</a>
  </div>
  <div class="player-info">
    <span id="hdr-chips" style="color:var(--gold)">🪙 –</span>
    <span id="hdr-username" style="color:var(--text-dim)"></span>
    <button class="btn btn-sm btn-outline" onclick="logout()">Logout</button>
  </div>
</header>

<div style="max-width:700px;margin:0 auto;padding:24px 16px">

  <!-- Avatar + Name Block -->
  <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px">
    <div id="profile-avatar" style="width:72px;height:72px;border-radius:50%;background:var(--chip-green);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#fff;flex-shrink:0;border:3px solid var(--gold)">?</div>
    <div>
      <div id="profile-display-name" style="font-size:1.4rem;font-weight:700;color:var(--text)">Loading…</div>
      <div id="profile-username" style="color:var(--text-dim);font-size:.9rem"></div>
      <div id="profile-role-badge" style="margin-top:4px"></div>
    </div>
  </div>

  <!-- Stats Cards -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px" id="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-hands">–</div>
      <div class="stat-label">Hands Won</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-biggest">–</div>
      <div class="stat-label">Biggest Pot</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-total">–</div>
      <div class="stat-label">Total Won</div>
    </div>
  </div>

  <!-- Chip Balance -->
  <div style="background:rgba(200,168,75,.07);border:1px solid rgba(200,168,75,.3);border-radius:var(--radius);padding:14px 18px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="color:var(--text-dim);font-size:.8rem;text-transform:uppercase;letter-spacing:.05em">Current Balance</div>
      <div style="color:var(--gold);font-size:1.5rem;font-weight:700" id="profile-chips">🪙 –</div>
    </div>
    <a href="/lobby.html"><button class="btn btn-gold">Play Now</button></a>
  </div>

  <!-- Edit Profile -->
  <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px">
    <h3 style="color:var(--gold);margin:0 0 16px;font-size:1rem">✏️ Edit Profile</h3>
    <div style="display:grid;gap:12px">
      <div class="form-group">
        <label class="form-label">Nickname</label>
        <input type="text" id="edit-nickname" maxlength="50" class="form-input" placeholder="Your nickname at the table">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input type="tel" id="edit-phone" maxlength="20" class="form-input" placeholder="+1 (555) 000-0000">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="edit-email" maxlength="200" class="form-input">
      </div>
      <div style="background:rgba(255,200,0,.06);border:1px solid rgba(255,200,0,.2);border-radius:6px;padding:10px 12px;font-size:.8rem;color:var(--text-dim)">
        ⚠️ Legal name changes require admin approval. Contact <a href="mailto:bostonspokerclub.amitureflops@gmail.com" style="color:var(--gold)">admin</a>.
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-gold" onclick="saveProfile()">Save Changes</button>
        <span id="save-status" style="font-size:.82rem;color:var(--chip-green)"></span>
      </div>
    </div>
  </div>

  <!-- Change Password -->
  <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px">
    <h3 style="color:var(--gold);margin:0 0 16px;font-size:1rem">🔒 Change Password</h3>
    <div style="display:grid;gap:12px">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <div class="pw-wrap">
          <input type="password" id="pw-current" class="form-input" autocomplete="current-password" placeholder="Your current password">
          <button type="button" class="pw-toggle" onclick="togglePw(this,'pw-current')" aria-label="Show password">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="pw-wrap">
          <input type="password" id="pw-new" class="form-input" autocomplete="new-password" placeholder="Min 6 characters">
          <button type="button" class="pw-toggle" onclick="togglePw(this,'pw-new')" aria-label="Show password">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <div class="pw-wrap">
          <input type="password" id="pw-confirm" class="form-input" autocomplete="new-password" placeholder="Repeat new password">
          <button type="button" class="pw-toggle" onclick="togglePw(this,'pw-confirm')" aria-label="Show password">👁</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-gold" onclick="changePassword()">Update Password</button>
        <span id="pw-status" style="font-size:.82rem"></span>
      </div>
    </div>
  </div>

  <!-- Recent Sessions -->
  <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius);padding:20px">
    <h3 style="color:var(--gold);margin:0 0 14px;font-size:1rem">📋 Recent Wins</h3>
    <div id="recent-sessions">
      <div style="color:var(--text-dim);font-size:.85rem;text-align:center;padding:16px">Loading…</div>
    </div>
  </div>

</div>

<script src="/js/auth.js"></script>
<script>
requireAuth();
const user = getUser();

async function loadProfile() {
  try {
    const res = await fetch('/api/me/profile', {
      headers: { Authorization: `Bearer ${getToken()}` }
    });
    if (!res.ok) { if (res.status === 401) { clearAuth(); location.href = '/index.html'; } return; }
    const data = await res.json();

    // Header
    document.getElementById('hdr-chips').textContent = `🪙 ${data.chips?.toLocaleString() || 0}`;
    document.getElementById('hdr-username').textContent = data.username;

    // Avatar (initials)
    const displayName = data.nickname || data.full_name || data.username || '?';
    document.getElementById('profile-avatar').textContent = displayName.charAt(0).toUpperCase();
    document.getElementById('profile-display-name').textContent = displayName;
    document.getElementById('profile-username').textContent = `@${data.username}${data.full_name ? '  ·  ' + data.full_name : ''}`;
    document.getElementById('profile-chips').textContent = `🪙 ${(data.chips || 0).toLocaleString()}`;

    // Role badge
    const roleBadge = document.getElementById('profile-role-badge');
    if (data.is_admin) roleBadge.innerHTML = '<span style="background:#c8a84b;color:#111;font-size:.7rem;font-weight:700;padding:2px 10px;border-radius:10px">👑 ADMIN</span>';
    else if (data.is_host) roleBadge.innerHTML = '<span style="background:var(--chip-green);color:#111;font-size:.7rem;font-weight:700;padding:2px 10px;border-radius:10px">🎰 HOST</span>';

    // Stats
    const s = data.stats || {};
    document.getElementById('stat-hands').textContent = (s.handsWon || 0).toLocaleString();
    document.getElementById('stat-biggest').textContent = s.biggestPot > 0 ? `$${s.biggestPot.toLocaleString()}` : '–';
    document.getElementById('stat-total').textContent = s.totalWon > 0 ? `$${s.totalWon.toLocaleString()}` : '–';

    // Edit fields
    document.getElementById('edit-nickname').value = data.nickname || '';
    document.getElementById('edit-phone').value = data.phone || '';
    document.getElementById('edit-email').value = data.email || '';

    // Recent sessions
    const sessions = data.recentSessions || [];
    const el = document.getElementById('recent-sessions');
    if (!sessions.length) {
      el.innerHTML = '<div style="color:var(--text-dim);font-size:.85rem;text-align:center;padding:16px">No wins recorded yet — start playing!</div>';
    } else {
      el.innerHTML = sessions.map(s => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.85rem">
          <div>
            <span style="color:var(--chip-green);font-weight:700">+$${(s.amount || 0).toLocaleString()}</span>
            ${s.handName ? `<span style="color:var(--text-dim);margin-left:8px">${esc(s.handName)}</span>` : ''}
          </div>
          <div style="color:var(--text-dim);font-size:.78rem">${s.tableName || ''}${s.date ? '  ·  ' + new Date(s.date).toLocaleDateString() : ''}</div>
        </div>`).join('');
    }
  } catch (e) {
    console.error('Profile load error:', e);
  }
}

async function saveProfile() {
  const status = document.getElementById('save-status');
  status.textContent = 'Saving…';
  try {
    const body = {
      nickname: document.getElementById('edit-nickname').value.trim(),
      phone: document.getElementById('edit-phone').value.trim(),
      email: document.getElementById('edit-email').value.trim()
    };
    const res = await fetch('/api/me/profile', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) { status.style.color = 'var(--red)'; status.textContent = data.error || 'Error saving'; return; }
    status.style.color = 'var(--chip-green)';
    status.textContent = '✓ Saved!';
    setTimeout(() => { status.textContent = ''; }, 3000);
    // Update display
    if (body.nickname) {
      document.getElementById('profile-avatar').textContent = body.nickname.charAt(0).toUpperCase();
      document.getElementById('profile-display-name').textContent = body.nickname;
    }
  } catch {
    status.style.color = 'var(--red)';
    status.textContent = 'Network error';
  }
}

function esc(s) { return String(s || '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

function togglePw(btn, id) {
  const inp = document.getElementById(id);
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  btn.textContent = showing ? '👁' : '🙈';
  btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
}

async function changePassword() {
  const status = document.getElementById('pw-status');
  const current = document.getElementById('pw-current').value;
  const newPw   = document.getElementById('pw-new').value;
  const confirm = document.getElementById('pw-confirm').value;
  status.textContent = '';
  if (!current) { status.style.color = 'var(--red)'; status.textContent = 'Enter your current password'; return; }
  if (!newPw || newPw.length < 6) { status.style.color = 'var(--red)'; status.textContent = 'New password must be at least 6 characters'; return; }
  if (newPw !== confirm) { status.style.color = 'var(--red)'; status.textContent = 'Passwords do not match'; return; }
  status.style.color = 'var(--text-dim)';
  status.textContent = 'Saving…';
  try {
    const res = await fetch('/api/me/password', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
      body: JSON.stringify({ currentPassword: current, newPassword: newPw })
    });
    const data = await res.json();
    if (!res.ok) { status.style.color = 'var(--red)'; status.textContent = data.error || 'Error'; return; }
    status.style.color = 'var(--chip-green)';
    status.textContent = '✓ Password updated!';
    document.getElementById('pw-current').value = '';
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-confirm').value = '';
    setTimeout(() => { status.textContent = ''; }, 4000);
  } catch {
    status.style.color = 'var(--red)';
    status.textContent = 'Network error';
  }
}

// Scroll input into view when mobile keyboard opens
document.addEventListener('focusin', e => {
  if (e.target.matches('input')) {
    setTimeout(() => e.target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
  }
});

function logout() {
  clearAuth();
  location.href = '/index.html';
}

loadProfile();
</script>

</body>
</html>
